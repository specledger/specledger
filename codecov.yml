# Codecov Configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 25%
        threshold: 1%
        informational: true
    patch:
      default:
        target: 25%
        threshold: 1%
        informational: true

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "**/*.mock.go"
  - "**/*_mock.go"
  - "**/*_test.go"
  - "tests/**"
  - "cmd/**"
  - "**/generated/**"
  # Hard-to-test packages (browser, TUI, network, OS-specific)
  - "pkg/cli/auth/**"
  - "pkg/cli/tui/**"
  - "pkg/cli/ui/**"
  - "pkg/version/**"
  - "pkg/templates/updater.go"
  # CLI command handlers (require integration tests)
  - "pkg/cli/commands/**"
  # Git operations (require external git)
  - "pkg/cli/git/**"
  # File system operations
  - "internal/spec/resolver.go"
  - "internal/agent/platform.go"

github_checks:
  annotations: true
