# .goreleaser.yaml - GitHub Releases Configuration
# Enables cross-platform builds and automated release creation
version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

env:
  - GO111MODULE=auto
  - CGO_ENABLED=0

checksum:
  name_template: 'checksums.txt'

changelog:
  disable: true

builds:
  - id: sl
    main: ./cmd/sl/main.go
    binary: sl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.buildVersion={{.Version}} -X main.buildCommit={{.Commit}} -X main.buildDate={{.Date}} -X main.buildType=release

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: 'specledger_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE
      - README.md

brews:
  - name: specledger
    homepage: 'https://github.com/specledger/specledger'
    description: 'Unified CLI for project bootstrap and specification dependency management'
    license: MIT
    directory: Formula
    repository:
      owner: specledger
      name: homebrew-specledger
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    skip_upload: auto

release:
  github:
    owner: specledger
    name: specledger
  prerelease: auto
  draft: false
  mode: keep-existing
