version: "2"
run:
  tests: true
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosec
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # ──────────────────────────────────────────────────────────────────
      # Disabled staticcheck rules — intentional, not oversight.
      #
      # ST1005 (error string style) conflicts with our "Error Messages as
      # Navigation" principle (docs/design/cli.md, Principle 2). That
      # principle requires multi-line errors with proper casing, arrows,
      # and punctuation so that CLI agents and humans get actionable
      # guidance on failure. Flattening these into lowercase single-line
      # strings degrades the user experience.
      #
      # QF* rules (QF1001 De Morgan, QF1003 tagged switch, QF1011 omit
      # type) are style suggestions, not correctness issues. We prefer
      # readability over mechanical transformation in these cases.
      #
      # G306 (WriteFile permissions > 0600) — files like .gitattributes
      # must be world-readable (0644). The std-error-handling preset
      # covers G301/G302 but not G306.
      #
      # G101 (hardcoded credentials) — false positives on struct field
      # names like "ApiKeyEnvVar" in the agent registry and JSON tags
      # like "access_token" in auth structs. These are field names and
      # keys, not actual secrets.
      #
      # G117 (marshaled secret pattern) — same category as G101; flags
      # JSON struct tags that match secret-like names in auth types.
      #
      # G703 (path traversal) — CLI tool that intentionally operates on
      # user-specified paths (vendor imports, template copies, git ops).
      # Path validation happens at the command/argument level.
      #
      # G122 (TOCTOU in WalkDir) — filepath.Walk callbacks in style
      # scanner. The walk is over a local project directory; symlink
      # races are not a realistic threat here.
      #
      # G602 (slice index out of range) — false positive in version
      # checker where the slice is bounds-checked by the loop condition.
      # ──────────────────────────────────────────────────────────────────
      - linters: [staticcheck]
        text: "ST1005"
      - linters: [staticcheck]
        text: "QF1"
      - linters: [gosec]
        text: "G306"
      - linters: [gosec]
        text: "G101"
      - linters: [gosec]
        text: "G117"
      - linters: [gosec]
        text: "G703"
      - linters: [gosec]
        text: "G122"
      - linters: [gosec]
        text: "G602"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
